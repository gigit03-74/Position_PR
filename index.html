<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capteur de Position Routière</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f6f9; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 30px auto; }
        h1 { color: #2c3e50; font-size: 22px; margin-top: 0; }
        .pr-display { font-size: 24px; font-weight: bold; color: #27ae60; background: #e8f8f0; padding: 15px; border-radius: 8px; margin: 20px 0; border: 2px solid #2ecc71; }
        .coords { font-size: 12px; color: #7f8c8d; margin-bottom: 20px; }
        button { background: #2980b9; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background: #3498db; }
        button:disabled { background: #bdc3c7; }
        .status { font-size: 14px; color: #e67e22; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Mon Positionnement Route</h1>
        
        <div id="statut" class="status">Prêt à localiser</div>
        
        <div id="affichage-pr" class="pr-display">-- En attente --</div>
        
        <div id="affichage-coords" class="coords">Lat: -- | Lon: --</div>
        
        <button id="btn-gps" onclick="obtenirPosition()">📍 Trouver ma route actuelle</button>
    </div>

    <script>
        function obtenirPosition() {
            const btn = document.getElementById('btn-gps');
            const statut = document.getElementById('statut');
            const affichagePr = document.getElementById('affichage-pr');
            const affichageCoords = document.getElementById('affichage-coords');

            if (!navigator.geolocation) {
                alert("La géolocalisation n'est pas supportée.");
                return;
            }

            btn.disabled = true;
            statut.innerText = "Recherche du signal GPS...";
            affichagePr.innerText = "Calcul...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    affichageCoords.innerText = `Lat: ${lat.toFixed(5)} | Lon: ${lon.toFixed(5)}`;
                    statut.innerText = "Scan de la base routière...";

                    // On cherche la route (highway) la plus proche dans un rayon de 50 mètres autour du point GPS
                    const query = `[out:json];way(around:50,${lat},${lon})[highway];out tags;`;
                    const urlOSM = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

                    fetch(urlOSM)
                        .then(response => {
                            if (!response.ok) throw new Error(`Serveur injoignable (${response.status})`);
                            return response.json();
                        })
                        .then(data => {
                            if (data.elements && data.elements.length > 0) {
                                // On prend la route trouvée la plus proche
                                const tags = data.elements[0].tags;
                                
                                const ref = tags.ref || ""; // Ex: D920
                                const name = tags.name || ""; // Ex: Route de Paris
                                
                                // On formate joliment l'affichage selon les infos dispo
                                if (ref && name) {
                                    affichagePr.innerText = `${ref} (${name})`;
                                } else if (ref) {
                                    affichagePr.innerText = ref;
                                } else if (name) {
                                    affichagePr.innerText = name;
                                } else {
                                    affichagePr.innerText = "Voie sans nom";
                                }

                                affichagePr.style.color = "#27ae60";
                                affichagePr.style.borderColor = "#2ecc71";
                                affichagePr.style.background = "#e8f8f0";
                                statut.innerText = "Route identifiée !";
                            } else {
                                affichagePr.innerText = "📍 Aucune route proche";
                                affichagePr.style.color = "#d35400";
                                affichagePr.style.borderColor = "#e67e22";
                                affichagePr.style.background = "#fdf2e9";
                                statut.innerText = "Rapprochez-vous d'une voie carrossable (rayon 50m).";
                            }
                            btn.disabled = false;
                        })
                        .catch(erreur => {
                            console.error(erreur);
                            affichagePr.innerText = "❌ Erreur réseau";
                            affichagePr.style.color = "#c0392b";
                            affichagePr.style.borderColor = "#e74c3c";
                            affichagePr.style.background = "#fadbd8";
                            statut.innerText = erreur.message;
                            btn.disabled = false;
                        });
                },
                (erreurGPS) => {
                    statut.innerText = "Signal GPS perdu.";
                    affichagePr.innerText = "-- Position impossible --";
                    btn.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 12000,
                    maximumAge: 0
                }
            );
        }
    </script>
</body>
</html>
