<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrouille Allier - 25 Axes</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #111; text-align: center; color: white; }
        .card { background: #222; padding: 25px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); max-width: 380px; margin: 20px auto; border: 2px solid #333; }
        h2 { margin-top: 0; color: #ecf0f1; font-size: 18px; letter-spacing: 1px; }
        .pr-display { font-size: 36px; font-weight: bold; color: #2ecc71; background: #000; padding: 25px; border-radius: 10px; margin: 20px 0; border: 3px solid #2ecc71; line-height: 1.3; font-family: 'Courier New', monospace; white-space: pre-line; }
        .coords { font-size: 11px; color: #666; font-family: monospace; }
        .status { font-size: 14px; color: #f1c40f; font-weight: bold; }
        .precision-badge { display: inline-block; padding: 4px 8px; background: #2980b9; border-radius: 4px; font-size: 11px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📍 LOCALISATEUR 25 AXES (03)</h2>
        <div id="statut" class="status">Chargement de la base routière...</div>
        <div id="affichage-pr" class="pr-display">DÉMARRAGE...</div>
        <div id="precision" class="precision-badge">GPS : En attente</div>
        <div id="affichage-coords" class="coords" style="margin-top:15px;">Calcul 100% Local (0ms)</div>
    </div>

    <script>
        let tablePR = [];

        // Chargement immédiat du fichier de tes routes
        window.onload = function() {
            fetch('routes03.json')
                .then(res => res.json())
                .then(data => {
                    tablePR = data;
                    document.getElementById('statut').innerText = "Base 25 routes chargée. Prêt !";
                    lancerSuivi();
                })
                .catch(err => {
                    document.getElementById('statut').innerText = "Erreur de chargement du fichier JSON";
                    document.getElementById('affichage-pr').innerText = "ERREUR FICHIER";
                });
        };

        function distancePrecise(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Rayon de la Terre en mètres
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function lancerSuivi() {
            navigator.geolocation.watchPosition((position) => {
                const myLat = position.coords.latitude;
                const myLon = position.coords.longitude;
                const gpsAccuracy = position.coords.accuracy;
                
                document.getElementById('precision').innerText = `Précision GPS : ± ${Math.round(gpsAccuracy)}m`;
                document.getElementById('affichage-coords').innerText = `LAT: ${myLat.toFixed(6)} | LON: ${myLon.toFixed(6)}`;

                let plusPetiteDistance = Infinity;
                let borneLaPlusProche = null;

                // Scan local instantané
                for (let i = 0; i < tablePR.length; i++) {
                    const borne = tablePR[i];
                    const d = distancePrecise(myLat, myLon, borne.lat, borne.lon);
                    
                    if (d < plusPetiteDistance) {
                        plusPetiteDistance = d;
                        borneLaPlusProche = borne;
                    }
                }

                // Affichage précis si une de tes 25 routes est détectée à proximité
                if (borneLaPlusProche && plusPetiteDistance < 2000) {
                    const route = borneLaPlusProche.r;
                    const pr = borneLaPlusProche.pr;
                    const metresCumules = Math.round(plusPetiteDistance);

                    document.getElementById('affichage-pr').innerText = `${route}\nPR ${pr} + ${metresCumules}m`;
                    document.getElementById('statut').innerText = "SUIVI TEMPS RÉEL ACTIF";
                    document.getElementById('statut').style.color = "#2ecc71";
                } else {
                    document.getElementById('affichage-pr').innerText = "HORS ZONE";
                    document.getElementById('statut').innerText = "Éloigné de tes 25 axes de patrouille.";
                    document.getElementById('statut').style.color = "#e67e22";
                }

            }, () => {
                document.getElementById('statut').innerText = "SIGNAL GPS INTROUVABLE";
                document.getElementById('statut').style.color = "#e74c3c";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 4000
            });
        }
    </script>
</body>
</html>
