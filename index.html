<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capteur de PR Routier</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f6f9; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 30px auto; }
        h1 { color: #2c3e50; font-size: 22px; margin-top: 0; }
        .pr-display { font-size: 24px; font-weight: bold; color: #27ae60; background: #e8f8f0; padding: 15px; border-radius: 8px; margin: 20px 0; border: 2px solid #2ecc71; }
        .coords { font-size: 12px; color: #7f8c8d; margin-bottom: 20px; }
        button { background: #2980b9; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background: #3498db; }
        button:disabled { background: #bdc3c7; }
        .status { font-size: 14px; color: #e67e22; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Mon Positionnement PR</h1>
        
        <div id="statut" class="status">Prêt à localiser</div>
        
        <div id="affichage-pr" class="pr-display">-- En attente --</div>
        
        <div id="affichage-coords" class="coords">Lat: -- | Lon: --</div>
        
        <button id="btn-gps" onclick="obtenirPR()">📍 Obtenir mon PR actuel</button>
    </div>

    <script>
        function obtenirPR() {
            const btn = document.getElementById('btn-gps');
            const statut = document.getElementById('statut');
            const affichagePr = document.getElementById('affichage-pr');
            const affichageCoords = document.getElementById('affichage-coords');

            if (!navigator.geolocation) {
                alert("La géolocalisation n'est pas supportée par votre navigateur.");
                return;
            }

            btn.disabled = true;
            statut.innerText = "Recherche du signal satellite (GPS)...";
            affichagePr.innerText = "Calcul...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    affichageCoords.innerText = `Lat: ${lat.toFixed(5)} | Lon: ${lon.toFixed(5)}`;
                    statut.innerText = "Interrogation du réseau routier IGN...";

                    // Nouvelle URL simplifiée et tolérée par la plateforme GéOPF pour le réseau linéaire
                    const urlIGN = `https://data.geopf.fr/geocodage/reverse?lon=${lon}&lat=${lat}&index=reverse_geocode_lineaire`;

                    fetch(urlIGN)
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`Erreur serveur ${response.status}`);
                            }
                            return response.json();
                        })
                        .then(data => {
                            if (data.features && data.features.length > 0) {
                                const props = data.features[0].properties;
                                
                                // Extraction robuste des données
                                const nomRoute = props.route || props.nom || "Route sans nom";
                                const numPR = props.pr !== undefined ? props.pr : "?";
                                const distanceAbs = props.abs !== undefined ? Math.round(props.abs) : 0;

                                affichagePr.innerText = `${nomRoute} - PR ${numPR} + ${distanceAbs}m`;
                                affichagePr.style.color = "#27ae60";
                                affichagePr.style.borderColor = "#2ecc71";
                                affichagePr.style.background = "#e8f8f0";
                                statut.innerText = "PR identifié avec succès !";
                            } else {
                                affichagePr.innerText = "📍 Hors réseau à PR";
                                affichagePr.style.color = "#d35400";
                                affichagePr.style.borderColor = "#e67e22";
                                affichagePr.style.background = "#fdf2e9";
                                statut.innerText = "Aucun axe routier à bornage kilométrique trouvé ici.";
                            }
                            btn.disabled = false;
                        })
                        .catch(erreur => {
                            console.error(erreur);
                            // On affiche le message précis de l'erreur pour comprendre le blocage
                            affichagePr.innerText = "❌ Erreur";
                            affichagePr.style.color = "#c0392b";
                            affichagePr.style.borderColor = "#e74c3c";
                            affichagePr.style.background = "#fadbd8";
                            statut.innerText = `Détail : ${erreur.message}`;
                            btn.disabled = false;
                        });
                },
                (erreurGPS) => {
                    statut.innerText = "Signal GPS défaillant.";
                    affichagePr.innerText = "-- Localisation impossible --";
                    btn.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }
    </script>
</body>
</html>
