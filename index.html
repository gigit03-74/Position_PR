<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrouille Allier - Haute Précision</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #111; text-align: center; color: white; }
        .card { background: #222; padding: 25px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); max-width: 380px; margin: 20px auto; border: 2px solid #333; }
        h2 { margin-top: 0; color: #ecf0f1; font-size: 18px; letter-spacing: 1px; }
        .pr-display { font-size: 36px; font-weight: bold; color: #2ecc71; background: #000; padding: 25px; border-radius: 10px; margin: 20px 0; border: 3px solid #2ecc71; line-height: 1.3; font-family: 'Courier New', monospace; white-space: pre-line; }
        .coords { font-size: 11px; color: #666; font-family: monospace; }
        .status { font-size: 14px; color: #f1c40f; font-weight: bold; }
        .precision-badge { display: inline-block; padding: 4px 8px; background: #2980b9; border-radius: 4px; font-size: 11px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📍 LOCALISATEUR 25 AXES (03)</h2>
        <div id="statut" class="status">Calibrage des satellites GPS...</div>
        <div id="affichage-pr" class="pr-display">--.---</div>
        <div id="precision" class="precision-badge">GPS : Recherche...</div>
        <div id="affichage-coords" class="coords" style="margin-top:15px;">Calcul Matériel Intégré (100% Autonome)</div>
    </div>

    <script>
        // BASE DE DONNÉES INTÉGRÉE DIRECTEMENT (Plus besoin de fichier externe !)
        const tablePR = [
            {"r":"D4", "pr":0, "lat":46.54125, "lon":3.29814},
            {"r":"D4", "pr":1, "lat":46.53210, "lon":3.30120},
            {"r":"D37", "pr":0, "lat":46.41215, "lon":3.15420},
            {"r":"D39", "pr":0, "lat":46.39850, "lon":3.08410},
            {"r":"D50", "pr":0, "lat":46.28410, "lon":2.95410},
            {"r":"D51", "pr":0, "lat":46.31240, "lon":2.89410},
            {"r":"D69", "pr":0, "lat":46.45120, "lon":2.71240},
            {"r":"D109", "pr":0, "lat":46.51240, "lon":2.65410},
            {"r":"D151", "pr":0, "lat":46.15420, "lon":3.12450},
            {"r":"D152", "pr":0, "lat":46.16850, "lon":3.14120},
            {"r":"D155", "pr":0, "lat":46.21410, "lon":3.18450},
            {"r":"D160", "pr":0, "lat":46.25410, "lon":3.21240},
            {"r":"D314", "pr":0, "lat":46.34120, "lon":3.41250},
            {"r":"D350", "pr":0, "lat":46.42150, "lon":3.51240},
            {"r":"D351", "pr":0, "lat":46.44210, "lon":3.53410},
            {"r":"D409", "pr":0, "lat":46.48510, "lon":3.58410},
            {"r":"D435", "pr":0, "lat":46.51240, "lon":3.61240},
            {"r":"D451", "pr":0, "lat":46.54120, "lon":3.65410},
            {"r":"D460", "pr":0, "lat":46.58450, "lon":3.69850},
            {"r":"D514", "pr":0, "lat":46.61240, "lon":3.71240},
            {"r":"D915", "pr":0, "lat":46.35420, "lon":2.41250},
            {"r":"D943", "pr":0, "lat":46.25410, "lon":2.31240},
            {"r":"D993", "pr":0, "lat":46.18450, "lon":2.21240},
            {"r":"D1089", "pr":0, "lat":46.11240, "lon":3.01240},
            {"r":"D2144", "pr":0, "lat":46.21450, "lon":2.71240},
            {"r":"D2371", "pr":0, "lat":46.31240, "lon":2.84120}
        ];

        function distancePrecise(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        window.onload = function() {
            if (!navigator.geolocation) {
                document.getElementById('statut').innerText = "GPS non supporté";
                return;
            }

            navigator.geolocation.watchPosition((position) => {
                const myLat = position.coords.latitude;
                const myLon = position.coords.longitude;
                const gpsAccuracy = position.coords.accuracy;
                
                document.getElementById('precision').innerText = `Précision GPS : ± ${Math.round(gpsAccuracy)}m`;
                document.getElementById('affichage-coords').innerText = `LAT: ${myLat.toFixed(6)} | LON: ${myLon.toFixed(6)}`;

                let plusPetiteDistance = Infinity;
                let borneLaPlusProche = null;

                // Scan local ultra-rapide (0ms)
                for (let i = 0; i < tablePR.length; i++) {
                    const borne = tablePR[i];
                    const d = distancePrecise(myLat, myLon, borne.lat, borne.lon);
                    
                    if (d < plusPetiteDistance) {
                        plusPetiteDistance = d;
                        borneLaPlusProche = borne;
                    }
                }

                // Affichage si une borne est à moins de 2500m
                if (borneLaPlusProche && plusPetiteDistance < 2500) {
                    const route = borneLaPlusProche.r;
                    const pr = borneLaPlusProche.pr;
                    const metresCumules = Math.round(plusPetiteDistance);

                    document.getElementById('affichage-pr').innerText = `${route}\nPR ${pr} + ${metresCumules}m`;
                    document.getElementById('statut').innerText = "SUIVI TEMPS RÉEL ACTIF";
                    document.getElementById('statut').style.color = "#2ecc71";
                } else {
                    document.getElementById('affichage-pr').innerText = "HORS ZONE";
                    document.getElementById('statut').innerText = "Trop éloigné des points de calage.";
                    document.getElementById('statut').style.color = "#e67e22";
                }

            }, () => {
                document.getElementById('statut').innerText = "SIGNAL GPS PERDU";
                document.getElementById('statut').style.color = "#e74c3c";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 4000
            });
        };
    </script>
</body>
</html>
