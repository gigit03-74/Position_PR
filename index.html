<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrouille 03 - Live</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #2c3e50; text-align: center; color: white; }
        .card { background: #34495e; padding: 25px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); max-width: 360px; margin: 20px auto; border: 1px solid #455a64; }
        h2 { margin-top: 0; color: #ecf0f1; font-size: 20px; }
        .pr-display { font-size: 32px; font-weight: bold; color: #2ecc71; background: #1a252f; padding: 20px; border-radius: 10px; margin: 20px 0; border: 2px solid #2ecc71; letter-spacing: 1px; }
        .coords { font-size: 12px; color: #bdc3c7; margin-top: 15px; }
        .status { font-size: 15px; color: #f1c40f; font-style: italic; font-weight: bold; }
        .live-indicator { display: inline-block; width: 10px; height: 10px; background-color: #e74c3c; border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="card">
        <h2>📍 Patrouille Live Allier (03)</h2>
        <div id="statut" class="status"><span class="live-indicator"></span>Démarrage du suivi...</div>
        <div id="affichage-pr" class="pr-display">-- RECHERCHE --</div>
        <div id="affichage-coords" class="coords">En attente du signal GPS...</div>
    </div>

    <script>
        // Dès que la page s'ouvre, on lance le suivi automatique
        window.onload = function() {
            if (!navigator.geolocation) {
                document.getElementById('statut').innerText = "GPS non supporté";
                return;
            }

            // watchPosition suit ton déplacement en temps réel
            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const vitesse = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0; // Vitesse en km/h
                
                document.getElementById('affichage-coords').innerText = `Lat: ${lat.toFixed(5)} | Lon: ${lon.toFixed(5)} | ${vitesse} km/h`;
                document.getElementById('statut').innerHTML = '<span class="live-indicator"></span>Calcul en cours...';

                // Requête ultra-rapide sur la route la plus proche
                const query = `[out:json];way(around:40,${lat},${lon})[highway];out geom;`;
                const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

                fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.elements && data.elements.length > 0) {
                        const way = data.elements[0];
                        const route = way.tags.ref || way.tags.name || "Route communale";
                        
                        if (way.geometry) {
                            const p = way.geometry[0];
                            const R = 6371e3;
                            const dLat = (lat - p.lat) * Math.PI / 180;
                            const dLon = (lon - p.lon) * Math.PI / 180;
                            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(p.lat * Math.PI / 180) * Math.cos(lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                            const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                            
                            // Mise à jour de l'écran en direct
                            document.getElementById('affichage-pr').innerText = `${route} \n PR ${Math.floor(dist/1000)} + ${Math.round(dist%1000)}m`;
                        } else {
                            document.getElementById('affichage-pr').innerText = route;
                        }
                        document.getElementById('statut').innerHTML = '<span class="live-indicator"></span>Suivi en direct actif';
                    } else {
                        document.getElementById('affichage-pr').innerText = "Hors réseau RD";
                        document.getElementById('statut').innerHTML = '<span class="live-indicator"></span>Aucune route à 40m';
                    }
                })
                .catch(() => {
                    document.getElementById('statut').innerHTML = '<span class="live-indicator"></span>Erreur de rafraîchissement';
                });
            }, () => {
                document.getElementById('statut').innerText = "Signal GPS perdu";
            }, {
                enableHighAccuracy: true, // Force le GPS haute précision (indispensable en voiture)
                maximumAge: 0,            // Pas de position en cache, on veut du réel
                timeout: 5000             // Relance toutes les 5 secondes max si ça bloque
            });
        };
    </script>
</body>
</html>
